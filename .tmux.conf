# Enable mouse support (click to switch panes, resize with mouse)
set -g mouse on

# Set the prefix to Alt + i
unbind C-b
set-option -g prefix M-i
bind-key M-i send-prefix

# Better split commands (v for vertical, h for horizontal)
bind v split-window -h
bind h split-window -v
unbind '"'
unbind %

# Switch panes using Alt-hjkl without prefix
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

# Resize panes using Alt-Shift-hjkl without prefix
bind -n M-H resize-pane -L 5
bind -n M-L resize-pane -R 5
bind -n M-K resize-pane -U 1
bind -n M-J resize-pane -D 1

# Use vi keybindings in copy mode
set-window-option -g mode-keys vi
bind e copy-mode
bind n next-window
